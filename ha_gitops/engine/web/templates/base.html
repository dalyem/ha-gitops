<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}HA-GitOps{% endblock %}</title>
  <!-- CSS is inlined: HA Ingress serves the add-on under a per-session path
       prefix, so an external /static link would mis-route. -->
  <style>{% raw %}
  :root {
    --bg:#f4f6f9; --panel:#fff; --ink:#1c2733; --muted:#6b7785; --line:#e3e8ee;
    --brand:#03a9f4; --brand-d:#0288c7; --ok:#2e9e5b; --warn:#d9930a; --err:#d23f3f;
    --chip:#eef2f6;
  }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.55 -apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); background:var(--bg); }
  .topbar { display:flex; align-items:center; gap:22px; background:var(--panel);
    border-bottom:1px solid var(--line); padding:12px 20px; position:sticky; top:0; z-index:5;
    box-shadow:0 1px 3px rgba(0,0,0,.04); flex-wrap:wrap; }
  .brand { font-weight:700; font-size:16px; color:var(--brand); white-space:nowrap; }
  nav { display:flex; gap:4px; flex-wrap:wrap; }
  nav a { color:var(--muted); text-decoration:none; padding:6px 12px; border-radius:8px;
    font-size:14px; font-weight:500; }
  nav a:hover { background:var(--chip); color:var(--ink); }
  nav a.active { color:#fff; background:var(--brand); }
  a:focus-visible,.btn:focus-visible,button:focus-visible,
  input:focus-visible,select:focus-visible,textarea:focus-visible {
    outline:2px solid var(--brand); outline-offset:2px; }
  main { max-width:940px; margin:24px auto; padding:0 16px; }
  a { color:var(--brand-d); }
  h1 { font-size:23px; margin:0 0 18px; }
  h2 { font-size:15px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted);
    margin:0 0 12px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:20px; margin-bottom:16px; box-shadow:0 1px 2px rgba(0,0,0,.03); }
  .row { display:flex; gap:16px; flex-wrap:wrap; }
  .row > .card { flex:1; min-width:260px; }
  .kv { display:grid; grid-template-columns:150px 1fr; gap:8px 12px; margin:0; }
  .kv dt { color:var(--muted); }
  .kv dd { margin:0; font-family:ui-monospace,Menlo,monospace; word-break:break-all; }
  .btn { display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line);
    background:var(--panel); color:var(--ink); padding:9px 15px; border-radius:9px;
    cursor:pointer; font-size:14px; font-weight:500; text-decoration:none; }
  .btn:hover { background:var(--chip); }
  .btn.primary { background:var(--brand); border-color:var(--brand); color:#fff; }
  .btn.primary:hover { background:var(--brand-d); }
  .btn.danger { color:var(--err); border-color:#f3c9c9; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
  .badge { display:inline-block; padding:4px 11px; border-radius:999px; font-size:12px;
    font-weight:600; background:var(--chip); color:var(--ink); }
  .badge.ok { background:#e6f6ec; color:var(--ok); }
  .badge.warn { background:#fdf2dd; color:var(--warn); }
  .badge.err { background:#fbe6e6; color:var(--err); }
  .badge.info { background:#e6f6fe; color:var(--brand-d); }
  .muted { color:var(--muted); }
  .mono { font-family:ui-monospace,Menlo,monospace; }
  label { display:block; font-size:13px; color:var(--muted); margin:14px 0 5px; }
  input[type=text],input[type=password],select,textarea { width:100%; padding:10px 12px;
    border:1px solid var(--line); border-radius:9px; font:inherit; background:#fff; color:var(--ink); }
  table { width:100%; border-collapse:collapse; }
  th,td { text-align:left; padding:10px; border-bottom:1px solid var(--line); font-size:14px;
    vertical-align:top; }
  th { color:var(--muted); font-weight:600; }
  .finding { border-left:4px solid var(--line); padding:11px 15px; margin-bottom:10px;
    background:#fafbfc; border-radius:0 9px 9px 0; }
  .finding.blocker { border-color:var(--err); }
  .finding.warning { border-color:var(--warn); }
  .finding.recommendation { border-color:var(--brand); }
  .finding .title { font-weight:600; }
  .finding .paths { font-family:ui-monospace,monospace; font-size:12px; color:var(--muted); margin-top:4px; }
  .filelist { font-family:ui-monospace,monospace; font-size:13px; padding-left:18px; }
  .filelist li.add { color:var(--ok); }
  .filelist li.mod { color:var(--warn); }
  .filelist li.del { color:var(--err); }
  .hidden { display:none !important; }
  .toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:11px 18px; border-radius:10px; z-index:20;
    box-shadow:0 4px 16px rgba(0,0,0,.2); max-width:80%; }
  .toast.err { background:var(--err); }
  .overlay { position:fixed; inset:0; background:rgba(244,246,249,.75); display:flex;
    align-items:center; justify-content:center; gap:12px; z-index:30; }
  .spinner { width:24px; height:24px; border:3px solid var(--line);
    border-top-color:var(--brand); border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .empty { text-align:center; color:var(--muted); padding:30px; }
  {% endraw %}</style>
  <script>window.BASE_PATH = {{ base_path | tojson }};</script>
</head>
<body>
  <header class="topbar">
    <div class="brand">⎇ HA-GitOps</div>
    <nav>
      <a href="{{ base_path }}/" class="{{ 'active' if page == 'dashboard' }}">Dashboard</a>
      <a href="{{ base_path }}/setup" class="{{ 'active' if page == 'setup' }}">Setup</a>
      <a href="{{ base_path }}/readiness" class="{{ 'active' if page == 'readiness' }}">Readiness</a>
      <a href="{{ base_path }}/changes" class="{{ 'active' if page == 'changes' }}">Changes</a>
      <a href="{{ base_path }}/conflict" class="{{ 'active' if page == 'conflict' }}">Conflict</a>
      <a href="{{ base_path }}/history" class="{{ 'active' if page == 'history' }}">History</a>
      <a href="{{ base_path }}/settings" class="{{ 'active' if page == 'settings' }}">Settings</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
  <div id="overlay" class="overlay hidden"><div class="spinner"></div><span id="overlay-msg">Working…</span></div>
  <script>{% raw %}
  const BASE = window.BASE_PATH || "";
  const $ = (sel, root = document) => root.querySelector(sel);
  const $all = (sel, root = document) => [...root.querySelectorAll(sel)];

  function toast(msg, isError = false) {
    const t = $("#toast");
    t.textContent = msg;
    t.classList.toggle("err", isError);
    t.setAttribute("aria-live", isError ? "assertive" : "polite");
    t.classList.remove("hidden");
    setTimeout(() => t.classList.add("hidden"), 4000);
  }
  function overlay(on, msg = "Working…") {
    $("#overlay-msg").textContent = msg;
    $("#overlay").classList.toggle("hidden", !on);
  }

  async function api(path, method = "GET", body = null) {
    const opts = { method, headers: {} };
    if (body !== null) { opts.headers["Content-Type"] = "application/json"; opts.body = JSON.stringify(body); }
    const res = await fetch(BASE + path, opts);
    let data = null;
    try { data = await res.json(); } catch (e) { /* no body */ }
    if (!res.ok) {
      const detail = (data && (data.detail || data.message)) || res.statusText;
      throw new Error(detail);
    }
    return data;
  }

  function wireActions() {
    $all("[data-post]").forEach((el) => {
      el.addEventListener("click", async () => {
        const path = el.dataset.post;
        if (el.dataset.confirm && !confirm(el.dataset.confirm)) return;
        let body = null;
        if (el.dataset.body) { try { body = JSON.parse(el.dataset.body); } catch (e) {} }
        if (el.dataset.bodyFrom) {
          const src = $(el.dataset.bodyFrom);
          body = { [el.dataset.bodyKey || "message"]: src ? src.value : "" };
        }
        overlay(true, el.dataset.busy || "Working…");
        try {
          const result = await api(path, "POST", body);
          toast((result && (result.message || result.note)) || el.dataset.ok || "Done.");
          setTimeout(() => location.reload(), 700);
        } catch (e) { overlay(false); toast(e.message, true); }
      });
    });

    const monToggle = $("#monitoring-toggle");
    if (monToggle) {
      monToggle.addEventListener("change", async () => {
        monToggle.disabled = true;
        try { await api("/api/monitoring", "POST", { enabled: monToggle.checked }); toast("Monitoring " + (monToggle.checked ? "on" : "off")); }
        catch (e) { toast(e.message, true); monToggle.checked = !monToggle.checked; }
        finally { monToggle.disabled = false; }
      });
    }
  }

  async function wireSetup() {
    const tokenForm = $("#token-form");
    if (tokenForm) {
      tokenForm.addEventListener("submit", async (ev) => {
        ev.preventDefault();
        const tokenVal = $("#token").value.trim();
        if (!tokenVal) { toast("Paste a token first", true); return; }
        overlay(true, "Verifying token…");
        try {
          const r = await api("/api/token", "POST", { token: tokenVal });
          toast("Token saved" + (r.login ? " for " + r.login : ""));
          await loadRepos();
        } catch (e) { toast(e.message, true); }
        finally { overlay(false); }
      });
    }
    const repoSel = $("#repo-select");
    if (repoSel) {
      if (window.HAS_TOKEN) loadRepos();
      repoSel.addEventListener("change", loadBranches);
    }
    const connectBtn = $("#connect-btn");
    if (connectBtn) {
      connectBtn.addEventListener("click", async () => {
        const repo = $("#repo-select").value;
        if (!repo) { toast("Pick a repository", true); return; }
        const [owner, name] = repo.split("/");
        overlay(true, "Connecting & analyzing…");
        try {
          await api("/api/connect", "POST", {
            owner, repo: name,
            branch: $("#branch-select").value,
            config_path: $("#config-path").value.trim(),
          });
          toast("Connected. Redirecting to readiness…");
          setTimeout(() => location.href = BASE + "/readiness", 700);
        } catch (e) { toast(e.message, true); } finally { overlay(false); }
      });
    }
  }

  async function loadRepos() {
    const sel = $("#repo-select");
    if (!sel) return;
    sel.innerHTML = "<option>Loading…</option>";
    try {
      const { repos } = await api("/api/repos");
      sel.innerHTML = "";
      repos.forEach((r) => {
        const o = document.createElement("option");
        o.value = r.full_name;
        o.textContent = r.full_name + (r.private ? " 🔒" : "") + (r.can_push ? "" : " (read-only)");
        o.dataset.default = r.default_branch;
        sel.appendChild(o);
      });
      $("#repo-step").classList.remove("hidden");
      await loadBranches();
    } catch (e) { sel.innerHTML = ""; toast(e.message, true); }
  }

  async function loadBranches() {
    const sel = $("#repo-select");
    const branchSel = $("#branch-select");
    if (!sel || !sel.value) return;
    const [owner, name] = sel.value.split("/");
    const def = sel.selectedOptions[0] && sel.selectedOptions[0].dataset.default;
    branchSel.innerHTML = "<option>Loading…</option>";
    try {
      const { branches } = await api(`/api/branches?owner=${owner}&repo=${name}`);
      branchSel.innerHTML = "";
      if (branches.length === 0) {
        const o = document.createElement("option");
        o.value = def || "main"; o.textContent = (def || "main") + " (empty repo)";
        branchSel.appendChild(o);
      } else {
        branches.forEach((b) => {
          const o = document.createElement("option");
          o.value = b; o.textContent = b;
          if (b === def) o.selected = true;
          branchSel.appendChild(o);
        });
      }
    } catch (e) { branchSel.innerHTML = ""; toast(e.message, true); }
  }

  document.addEventListener("DOMContentLoaded", () => { wireActions(); wireSetup(); });
  {% endraw %}</script>
</body>
</html>
