name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ha_gitops/requirements.txt
          pip install pytest ruff
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest

  addon-lint:
    name: Add-on config lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: frenck/action-addon-linter@v2
        with:
          path: ./ha_gitops

  build:
    name: Build image (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: lint-test
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - name: Build add-on
        uses: home-assistant/builder@master
        with:
          args: |
            --${{ matrix.arch }} \
            --target /data \
            --test \
            --docker-hub-check false
