[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B", "UP"]
ignore = [
    "E501",   # long lines handled case-by-case
    "B008",   # FastAPI Query(...) in argument defaults is idiomatic
    "UP042",  # (str, Enum) is intentional and behaviour-safe (we always use .value)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402"]  # sys.path tweak in conftest before imports
